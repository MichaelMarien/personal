<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0b1020" />
<title>Scoreboard</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: #0b1020; color: white;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
  }
  body {
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .quarter-bar {
    display: flex; align-items: center; justify-content: center; gap: 16px;
    padding: 10px; background: #11172b; border-bottom: 1px solid #1f2a44;
    font-size: clamp(16px, 2.5vh, 22px);
  }
  .qbtn {
    background: #1f2a44; color: white; border: none; border-radius: 10px;
    width: 44px; height: 44px; font-size: 22px; font-weight: 700; cursor: pointer;
  }
  .qbtn:active { background: #2c3a5e; }
  .qlabel { min-width: 110px; text-align: center; font-weight: 600; letter-spacing: 0.5px; }
  .teams {
    flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    padding: 8px; min-height: 0;
  }
  .team {
    position: relative; overflow: hidden;
    border-radius: 18px; padding: 14px;
    display: flex; flex-direction: column; align-items: center; justify-content: space-between;
    min-height: 0;
  }
  .team.home { background: linear-gradient(160deg, #1e3a8a, #1d4ed8); }
  .team.away { background: linear-gradient(160deg, #b91c1c, #dc2626); }
  .logo {
    position: absolute; top: 50%; left: 50%;
    width: 80%; max-width: 420px; height: auto;
    transform: translate(-50%, -50%);
    opacity: 0; pointer-events: none;
    transition: opacity 200ms ease;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
  }
  .logo.visible { opacity: 0.5; }
  .name-row, .score, .buttons { position: relative; z-index: 1; }
  .name-row { display: flex; align-items: stretch; gap: 6px; width: 100%; }
  .name {
    background: rgba(255,255,255,0.1); border: none; color: white;
    font-size: clamp(18px, 3.5vh, 30px); font-weight: 700;
    text-align: center; flex: 1; min-width: 0; outline: none;
    user-select: text; -webkit-user-select: text;
    padding: 8px; border-radius: 8px;
    border: 1px dashed rgba(255,255,255,0.4);
  }
  .name:focus { background: rgba(255,255,255,0.2); border-style: solid; }
  .clear {
    flex: 0 0 auto; width: 44px;
    background: rgba(255,255,255,0.18); color: white;
    border: 1px solid rgba(255,255,255,0.4); border-radius: 8px;
    font-size: 20px; font-weight: 700; cursor: pointer; padding: 0;
  }
  .clear:active { background: rgba(255,255,255,0.3); }
  .logo-mini {
    flex: 0 0 auto; width: 44px; height: 44px; align-self: center;
    object-fit: contain; border-radius: 6px;
    background: rgba(255,255,255,0.9); padding: 3px;
    display: none;
  }
  .logo-mini.visible { display: block; }
  .score {
    font-size: clamp(110px, 28vh, 240px);
    font-weight: 900; line-height: 1; margin: 6px 0;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .buttons {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%;
  }
  .sbtn {
    background: white; border: none; border-radius: 12px;
    padding: 14px 0; font-size: clamp(16px, 2.5vh, 22px); font-weight: 800;
    cursor: pointer;
  }
  .sbtn:active { transform: scale(0.95); }
  .home .sbtn { color: #1e3a8a; }
  .away .sbtn { color: #b91c1c; }
  .sbtn.minus {
    background: rgba(255,255,255,0.18); color: white !important;
    border: 1px solid rgba(255,255,255,0.5);
  }
  .footer {
    display: flex; justify-content: center; gap: 12px;
    padding: 10px; background: #11172b; border-top: 1px solid #1f2a44;
  }
  .footer button {
    background: #374151; color: white; border: none; border-radius: 10px;
    padding: 10px 22px; font-size: 16px; font-weight: 600; cursor: pointer;
  }
  .footer button.danger { background: #7f1d1d; }
  .footer button.mic { background: #1f2937; display: flex; align-items: center; gap: 8px; }
  .footer button.mic.on { background: #b91c1c; box-shadow: 0 0 0 0 rgba(220,38,38,0.7); animation: pulse 1.4s infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(220,38,38,0.6); }
    70% { box-shadow: 0 0 0 12px rgba(220,38,38,0); }
    100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); }
  }
  .footer button:active { opacity: 0.8; }
  .toast {
    position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom) + 70px);
    transform: translateX(-50%);
    background: rgba(17,23,43,0.95); color: white;
    border: 1px solid #1f2a44; border-radius: 10px;
    padding: 10px 16px; font-size: 16px; font-weight: 600;
    pointer-events: none; opacity: 0; transition: opacity 200ms ease;
    z-index: 10; max-width: 80vw; text-align: center;
  }
  .toast.show { opacity: 1; }
  .toast.err { border-color: #7f1d1d; color: #fecaca; }
  /* Landscape phone tweaks */
  @media (max-height: 480px) {
    .quarter-bar { padding: 6px; }
    .qbtn { width: 38px; height: 38px; }
    .footer { padding: 6px; }
    .footer button { padding: 8px 18px; }
  }
</style>
</head>
<body>
  <div class="quarter-bar">
    <button class="qbtn" id="qMinus" aria-label="Previous quarter">−</button>
    <div class="qlabel" id="qLabel">QUARTER 1</div>
    <button class="qbtn" id="qPlus" aria-label="Next quarter">+</button>
  </div>

  <div class="teams">
    <div class="team home">
      <img class="logo" id="logoA" alt="" />
      <div class="name-row">
        <img class="logo-mini" id="logoMiniA" alt="" />
        <input class="name" id="nameA" value="HOME" placeholder="Tap to name" maxlength="30" />
        <button class="clear" data-clear="A" aria-label="Clear home name">×</button>
      </div>
      <div class="score" id="scoreA">0</div>
      <div class="buttons">
        <button class="sbtn" data-team="A" data-amt="1">+1</button>
        <button class="sbtn" data-team="A" data-amt="2">+2</button>
        <button class="sbtn" data-team="A" data-amt="3">+3</button>
        <button class="sbtn minus" data-team="A" data-amt="-1">−1</button>
      </div>
    </div>
    <div class="team away">
      <img class="logo" id="logoB" alt="" />
      <div class="name-row">
        <img class="logo-mini" id="logoMiniB" alt="" />
        <input class="name" id="nameB" value="AWAY" placeholder="Tap to name" maxlength="30" />
        <button class="clear" data-clear="B" aria-label="Clear away name">×</button>
      </div>
      <div class="score" id="scoreB">0</div>
      <div class="buttons">
        <button class="sbtn" data-team="B" data-amt="1">+1</button>
        <button class="sbtn" data-team="B" data-amt="2">+2</button>
        <button class="sbtn" data-team="B" data-amt="3">+3</button>
        <button class="sbtn minus" data-team="B" data-amt="-1">−1</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <button id="mic" class="mic" aria-label="Voice input">
      <span id="micIcon">🎤</span><span id="micLabel">Spraak</span>
    </button>
    <button id="reset" class="danger">Herbeginnen</button>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

<script>
  let scoreA = 0, scoreB = 0, quarter = 1;
  const sa = document.getElementById('scoreA');
  const sb = document.getElementById('scoreB');
  const ql = document.getElementById('qLabel');
  const nameA = document.getElementById('nameA');
  const nameB = document.getElementById('nameB');
  const logoA = document.getElementById('logoA');
  const logoB = document.getElementById('logoB');
  const logoMiniA = document.getElementById('logoMiniA');
  const logoMiniB = document.getElementById('logoMiniB');

  // --- Team logos via fuzzy name match. NBA via ESPN CDN, BNXT/local bundled. ---
  const nba = abbr => `https://a.espncdn.com/i/teamlogos/nba/500/${abbr}.png`;
  const TEAMS = [
    // NBA
    { id: 'atl', logo: nba('atl'), names: ['atlanta hawks', 'hawks', 'atlanta', 'atl'] },
    { id: 'bos', logo: nba('bos'), names: ['boston celtics', 'celtics', 'boston', 'bos'] },
    { id: 'bkn', logo: nba('bkn'), names: ['brooklyn nets', 'nets', 'brooklyn', 'bkn', 'bro'] },
    { id: 'cha', logo: nba('cha'), names: ['charlotte hornets', 'hornets', 'charlotte', 'cha', 'cho'] },
    { id: 'chi', logo: nba('chi'), names: ['chicago bulls', 'bulls', 'chicago', 'chi'] },
    { id: 'cle', logo: nba('cle'), names: ['cleveland cavaliers', 'cavaliers', 'cavs', 'cleveland', 'cle'] },
    { id: 'dal', logo: nba('dal'), names: ['dallas mavericks', 'mavericks', 'mavs', 'dallas', 'dal'] },
    { id: 'den', logo: nba('den'), names: ['denver nuggets', 'nuggets', 'denver', 'den'] },
    { id: 'det', logo: nba('det'), names: ['detroit pistons', 'pistons', 'detroit', 'det'] },
    { id: 'gs',  logo: nba('gs'),  names: ['golden state warriors', 'warriors', 'golden state', 'gsw', 'gs'] },
    { id: 'hou', logo: nba('hou'), names: ['houston rockets', 'rockets', 'houston', 'hou'] },
    { id: 'ind', logo: nba('ind'), names: ['indiana pacers', 'pacers', 'indiana', 'ind'] },
    { id: 'lac', logo: nba('lac'), names: ['los angeles clippers', 'la clippers', 'clippers', 'lac'] },
    { id: 'lal', logo: nba('lal'), names: ['los angeles lakers', 'la lakers', 'lakers', 'lal'] },
    { id: 'mem', logo: nba('mem'), names: ['memphis grizzlies', 'grizzlies', 'memphis', 'mem'] },
    { id: 'mia', logo: nba('mia'), names: ['miami heat', 'heat', 'miami', 'mia'] },
    { id: 'mil', logo: nba('mil'), names: ['milwaukee bucks', 'bucks', 'milwaukee', 'mil'] },
    { id: 'min', logo: nba('min'), names: ['minnesota timberwolves', 'timberwolves', 'wolves', 'minnesota', 'min'] },
    { id: 'no',  logo: nba('no'),  names: ['new orleans pelicans', 'pelicans', 'new orleans', 'nop'] },
    { id: 'ny',  logo: nba('ny'),  names: ['new york knicks', 'knicks', 'new york', 'nyk'] },
    { id: 'okc', logo: nba('okc'), names: ['oklahoma city thunder', 'thunder', 'oklahoma city', 'oklahoma', 'okc'] },
    { id: 'orl', logo: nba('orl'), names: ['orlando magic', 'magic', 'orlando', 'orl'] },
    { id: 'phi', logo: nba('phi'), names: ['philadelphia 76ers', '76ers', 'sixers', 'philadelphia', 'phi'] },
    { id: 'phx', logo: nba('phx'), names: ['phoenix suns', 'suns', 'phoenix', 'phx', 'pho'] },
    { id: 'por', logo: nba('por'), names: ['portland trail blazers', 'trail blazers', 'blazers', 'portland', 'por'] },
    { id: 'sac', logo: nba('sac'), names: ['sacramento kings', 'kings', 'sacramento', 'sac'] },
    { id: 'sa',  logo: nba('sa'),  names: ['san antonio spurs', 'spurs', 'san antonio', 'sas'] },
    { id: 'tor', logo: nba('tor'), names: ['toronto raptors', 'raptors', 'toronto', 'tor'] },
    { id: 'utah', logo: nba('utah'), names: ['utah jazz', 'jazz', 'utah', 'uta'] },
    { id: 'wsh', logo: nba('wsh'), names: ['washington wizards', 'wizards', 'washington', 'was', 'wsh'] },
    // BNXT — Belgian division
    { id: 'oostende', logo: 'logos/oostende.png', names: ['filou oostende', 'bc oostende', 'oostende', 'ostend', 'ostende'] },
    { id: 'leuven-bears', logo: 'logos/leuven-bears.png', names: ['stella artois leuven bears', 'leuven bears', 'bears leuven', 'leuven'] },
    { id: 'spirou', logo: 'logos/spirou.png', names: ['spirou charleroi', 'spirou basket', 'spirou', 'charleroi', 'val dieu spirou'] },
    { id: 'limburg-united', logo: 'logos/limburg-united.png', names: ['hubo limburg united', 'limburg united', 'limburg', 'hubo'] },
    { id: 'okapi-aalst', logo: 'logos/okapi-aalst.png', names: ['okapi aalst', 'okapi', 'aalst', 'aalstar'] },
    { id: 'brussels', logo: 'logos/brussels.png', names: ['brussels basketball', 'brussels', 'brussel'] },
    { id: 'kangoeroes', logo: 'logos/kangoeroes-mechelen.png', names: ['kangoeroes basket mechelen', 'kangoeroes mechelen', 'kangoeroes', 'mechelen'] },
    { id: 'kortrijk', logo: 'logos/kortrijk-spurs.png', names: ['kortrijk spurs', 'kortrijk'] },
    { id: 'mons-hainaut', logo: 'logos/mons-hainaut.png', names: ['union mons hainaut', 'mons hainaut', 'mons', 'hainaut'] },
    { id: 'antwerp-giants', logo: 'logos/antwerp-giants.jpg', names: ['windrose giants antwerp', 'antwerp giants', 'giants antwerp', 'antwerp', 'antwerpen', 'giants', 'windrose'] },
    // Local
    { id: 'dynamo-bertem', logo: 'logos/dynamo-bertem.png', names: ['dynamo bertem', 'dynamo', 'bertem'] }
  ];

  function normalizeName(s) {
    return (s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '')
      .replace(/[^a-z0-9 ]/g, ' ').replace(/\s+/g, ' ').trim();
  }

  function lev(a, b) {
    if (a === b) return 0;
    if (!a.length) return b.length;
    if (!b.length) return a.length;
    let prev = new Array(b.length + 1);
    let curr = new Array(b.length + 1);
    for (let j = 0; j <= b.length; j++) prev[j] = j;
    for (let i = 1; i <= a.length; i++) {
      curr[0] = i;
      for (let j = 1; j <= b.length; j++) {
        curr[j] = Math.min(
          prev[j] + 1,
          curr[j-1] + 1,
          prev[j-1] + (a[i-1] === b[j-1] ? 0 : 1)
        );
      }
      [prev, curr] = [curr, prev];
    }
    return prev[b.length];
  }

  function findTeam(input) {
    const q = normalizeName(input);
    if (q.length < 2) return null;
    let best = null, bestRatio = 1;
    for (const t of TEAMS) {
      for (const alias of t.names) {
        const a = normalizeName(alias);
        if (q === a) return t;
        if (a.length >= 4 && (q.includes(a) || (q.length >= 4 && a.includes(q)))) {
          if (bestRatio > 0.05) { best = t; bestRatio = 0.05; }
          continue;
        }
        const d = lev(q, a);
        const ratio = d / Math.max(q.length, a.length);
        if (ratio <= 0.3 && ratio < bestRatio) { best = t; bestRatio = ratio; }
      }
    }
    return best;
  }

  function updateLogo(input, imgEl, miniEl) {
    const team = findTeam(input.value);
    const els = miniEl ? [imgEl, miniEl] : [imgEl];
    if (team) {
      for (const el of els) {
        if (el.dataset.tid !== team.id) {
          el.dataset.tid = team.id;
          el.src = team.logo;
        }
        el.classList.add('visible');
      }
    } else {
      for (const el of els) {
        el.classList.remove('visible');
        el.removeAttribute('src');
        delete el.dataset.tid;
      }
    }
  }

  // --- Persistence: try localStorage, fall back to URL hash ---
  const STORAGE_KEY = 'scoreboard_state_v1';
  let useLocalStorage = true;
  try {
    localStorage.setItem('__test__', '1');
    localStorage.removeItem('__test__');
  } catch (e) {
    useLocalStorage = false;
  }

  function save() {
    const state = { a: scoreA, b: scoreB, q: quarter, na: nameA.value, nb: nameB.value };
    if (useLocalStorage) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
    } else {
      try { history.replaceState(null, '', '#' + btoa(JSON.stringify(state))); } catch (e) {}
    }
  }

  function load() {
    let raw = null;
    if (useLocalStorage) {
      try { raw = localStorage.getItem(STORAGE_KEY); } catch (e) {}
    }
    if (!raw && location.hash.length > 1) {
      try { raw = atob(location.hash.slice(1)); } catch (e) {}
    }
    if (!raw) return;
    try {
      const s = JSON.parse(raw);
      scoreA = s.a || 0;
      scoreB = s.b || 0;
      quarter = s.q || 1;
      if (s.na) nameA.value = s.na;
      if (s.nb) nameB.value = s.nb;
    } catch (e) {}
  }

  function render() {
    sa.textContent = scoreA;
    sb.textContent = scoreB;
    ql.textContent = 'QUARTER ' + quarter;
    save();
  }

  document.querySelectorAll('button[data-team]').forEach(btn => {
    btn.addEventListener('click', () => {
      const amt = parseInt(btn.dataset.amt, 10);
      if (btn.dataset.team === 'A') scoreA = Math.max(0, scoreA + amt);
      else scoreB = Math.max(0, scoreB + amt);
      render();
    });
  });

  document.getElementById('qPlus').addEventListener('click', () => {
    if (quarter < 9) quarter++;
    render();
  });
  document.getElementById('qMinus').addEventListener('click', () => {
    if (quarter > 1) quarter--;
    render();
  });

  nameA.addEventListener('input', () => { updateLogo(nameA, logoA, logoMiniA); save(); });
  nameB.addEventListener('input', () => { updateLogo(nameB, logoB, logoMiniB); save(); });

  document.querySelectorAll('button[data-clear]').forEach(btn => {
    btn.addEventListener('click', () => {
      const which = btn.dataset.clear;
      const input = which === 'A' ? nameA : nameB;
      const img = which === 'A' ? logoA : logoB;
      const mini = which === 'A' ? logoMiniA : logoMiniB;
      input.value = '';
      updateLogo(input, img, mini);
      save();
      input.focus();
    });
  });

  document.getElementById('reset').addEventListener('click', () => {
    if (confirm('Beide scores en kwart herbeginnen?')) {
      scoreA = 0; scoreB = 0; quarter = 1;
      render();
    }
  });

  // --- Voice scoring (Dutch) ---
  const toastEl = document.getElementById('toast');
  let toastTimer = null;
  function toast(msg, isErr) {
    toastEl.textContent = msg;
    toastEl.classList.toggle('err', !!isErr);
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
  }

  const NL_NUM = {
    een: 1, eentje: 1, 'één': 1, twee: 2, drie: 3,
    '1': 1, '2': 2, '3': 3
  };

  function parseUtterance(text) {
    const norm = normalizeName(text);
    if (!norm) return null;
    const tokens = norm.split(' ');
    let amount = null, sign = 1;
    const consumed = new Set();
    for (let i = 0; i < tokens.length; i++) {
      const tk = tokens[i];
      if (tk === 'min' || tk === 'minus' || tk === 'minder') { sign = -1; consumed.add(i); continue; }
      if (amount == null && NL_NUM[tk] != null) { amount = NL_NUM[tk]; consumed.add(i); continue; }
      if (tk === 'punt' || tk === 'punten' || tk === 'point' || tk === 'points' || tk === 'punteen') { consumed.add(i); }
    }
    if (amount == null) return null;
    const teamPart = tokens.filter((_, i) => !consumed.has(i)).join(' ').trim();
    if (!teamPart) return null;
    return { teamPart, amount: sign * amount };
  }

  function pickTeam(teamPart) {
    const matched = findTeam(teamPart);
    const aMatched = findTeam(nameA.value);
    const bMatched = findTeam(nameB.value);
    if (matched) {
      if (aMatched && matched.id === aMatched.id) return 'A';
      if (bMatched && matched.id === bMatched.id) return 'B';
    }
    const q = normalizeName(teamPart);
    const nA = normalizeName(nameA.value);
    const nB = normalizeName(nameB.value);
    const score = (a) => {
      if (!a) return Infinity;
      if (a.length >= 3 && (q.includes(a) || a.includes(q))) return 0;
      return lev(q, a) / Math.max(q.length, a.length);
    };
    const dA = score(nA), dB = score(nB);
    if (dA === Infinity && dB === Infinity) return null;
    if (Math.min(dA, dB) > 0.45) return null;
    return dA <= dB ? 'A' : 'B';
  }

  function applyVoice(text) {
    const parsed = parseUtterance(text);
    if (!parsed) return false;
    const which = pickTeam(parsed.teamPart);
    if (!which) return false;
    if (which === 'A') scoreA = Math.max(0, scoreA + parsed.amount);
    else scoreB = Math.max(0, scoreB + parsed.amount);
    render();
    const teamLabel = (which === 'A' ? nameA.value : nameB.value) || which;
    const sign = parsed.amount >= 0 ? '+' : '';
    toast(`${teamLabel} ${sign}${parsed.amount}`);
    return true;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const micBtn = document.getElementById('mic');
  const micLabel = document.getElementById('micLabel');
  let recognition = null;
  let micOn = false;
  let restartTimer = null;

  if (!SR) {
    micBtn.disabled = true;
    micBtn.style.opacity = 0.5;
    micLabel.textContent = 'Geen spraak';
  } else {
    recognition = new SR();
    recognition.lang = 'nl-NL';
    // iOS Safari is unreliable with continuous=true — it stops firing
    // results after the first utterance. Use single-shot mode and
    // immediately restart on `onend` to fake continuous listening.
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.maxAlternatives = 3;

    recognition.onresult = (ev) => {
      for (let i = ev.resultIndex; i < ev.results.length; i++) {
        const res = ev.results[i];
        if (!res.isFinal) continue;
        let applied = false;
        for (let k = 0; k < res.length; k++) {
          if (applyVoice(res[k].transcript)) { applied = true; break; }
        }
        if (!applied) {
          const heard = (res[0].transcript || '').trim();
          if (heard.length >= 3) toast(`? ${heard}`, true);
        }
      }
    };

    recognition.onerror = (ev) => {
      if (ev.error === 'not-allowed' || ev.error === 'service-not-allowed') {
        micOn = false;
        updateMicUI();
        toast('Microfoon geweigerd', true);
      }
      // 'no-speech', 'audio-capture', 'aborted', 'network' are transient on iOS;
      // onend will fire and we'll restart there.
    };

    const restart = () => {
      if (!micOn) return;
      try { recognition.start(); }
      catch (e) {
        // Already started or invalid state — try again shortly.
        clearTimeout(restartTimer);
        restartTimer = setTimeout(restart, 200);
      }
    };

    recognition.onend = () => {
      if (!micOn) return;
      clearTimeout(restartTimer);
      restartTimer = setTimeout(restart, 50);
    };
  }

  function updateMicUI() {
    micBtn.classList.toggle('on', micOn);
    micLabel.textContent = micOn ? 'Luistert…' : 'Spraak';
  }

  micBtn.addEventListener('click', () => {
    if (!recognition) return;
    if (micOn) {
      micOn = false;
      try { recognition.stop(); } catch (e) {}
      updateMicUI();
    } else {
      micOn = true;
      try { recognition.start(); updateMicUI(); }
      catch (e) { micOn = false; updateMicUI(); toast('Kon mic niet starten', true); }
    }
  });

  // Prevent double-tap zoom on iOS
  document.addEventListener('touchstart', function(e){ if(e.touches.length>1) e.preventDefault(); }, {passive:false});
  let lastTap = 0;
  document.addEventListener('touchend', function(e){
    const now = Date.now();
    if (now - lastTap < 300 && e.target.tagName !== 'INPUT') e.preventDefault();
    lastTap = now;
  }, {passive:false});

  // Keep screen awake (iPadOS 16.4+, modern browsers)
  let wakeLock = null;
  async function requestWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    } catch (e) {}
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && !wakeLock) requestWakeLock();
  });
  requestWakeLock();

  load();
  render();
  updateLogo(nameA, logoA, logoMiniA);
  updateLogo(nameB, logoB, logoMiniB);
</script>
</body>
</html>
